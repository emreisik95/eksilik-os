name: Feature request
description: Propose a focused improvement to ek$ilik
title: "[Feature]: "
labels: [enhancement]
body:
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and pull requests for this idea.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem or friction should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed experience
      description: Describe the desired behavior without prescribing unnecessary implementation details.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] …
        - [ ] …
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Mockups or additional context
