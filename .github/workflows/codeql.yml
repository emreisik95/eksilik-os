name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  XCODEGEN_URL: https://github.com/yonaskolb/XcodeGen/releases/download/2.46.0/xcodegen.artifactbundle.zip
  XCODEGEN_SHA256: ef6d0a23bfb7393387f98e321ffd78a487231172e2e78c48d3c26275c263fd0c
  XCODEGEN_ARCHIVE_DIRECTORY: xcodegen.artifactbundle/xcodegen-2.46.0-macosx/bin

jobs:
  analyze:
    name: Analyze Swift
    runs-on: macos-15
    timeout-minutes: 45
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install verified XcodeGen 2.46.0
        run: |
          bash .github/scripts/install_verified_zip_tree.sh \
            "$XCODEGEN_URL" \
            "$XCODEGEN_SHA256" \
            "$XCODEGEN_ARCHIVE_DIRECTORY" \
            "$RUNNER_TEMP/xcodegen"
          echo "$RUNNER_TEMP/xcodegen" >> "$GITHUB_PATH"

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          languages: swift
          build-mode: manual

      - name: Build for CodeQL
        run: |
          set -euo pipefail
          xcodebuild build \
            -project EksilikApp.xcodeproj \
            -scheme EksilikApp \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            -derivedDataPath "$RUNNER_TEMP/EksilikCodeQL" \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO

      - name: Analyze
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          category: /language:swift
