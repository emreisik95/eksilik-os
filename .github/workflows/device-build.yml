name: Build Device Artifact

on:
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: device-build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  XCODEGEN_URL: https://github.com/yonaskolb/XcodeGen/releases/download/2.46.0/xcodegen.artifactbundle.zip
  XCODEGEN_SHA256: ef6d0a23bfb7393387f98e321ffd78a487231172e2e78c48d3c26275c263fd0c
  XCODEGEN_ARCHIVE_DIRECTORY: xcodegen.artifactbundle/xcodegen-2.46.0-macosx/bin

jobs:
  device-build:
    name: Build unsigned iPhone app
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install verified XcodeGen 2.46.0
        run: |
          bash .github/scripts/install_verified_zip_tree.sh \
            "$XCODEGEN_URL" \
            "$XCODEGEN_SHA256" \
            "$XCODEGEN_ARCHIVE_DIRECTORY" \
            "$RUNNER_TEMP/xcodegen"
          echo "$RUNNER_TEMP/xcodegen" >> "$GITHUB_PATH"

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build for iPhone
        run: |
          set -euo pipefail
          xcodebuild build \
            -project EksilikApp.xcodeproj \
            -scheme EksilikApp \
            -configuration Debug \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath "$RUNNER_TEMP/EksilikDeviceBuild" \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY='' 2>&1 | tee "$RUNNER_TEMP/xcodebuild-device.log"

      - name: Package device app
        run: |
          set -euo pipefail
          APP_PATH="$RUNNER_TEMP/EksilikDeviceBuild/Build/Products/Debug-iphoneos/EksilikApp.app"
          test -d "$APP_PATH"
          test -d "$APP_PATH/PlugIns/EksilikWidget.appex"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$APP_PATH/Info.plist")" = "emre.isik.Eksilik"
          tar -C "$(dirname "$APP_PATH")" -czf "$RUNNER_TEMP/EksilikApp-unsigned.tar.gz" "$(basename "$APP_PATH")"

      - name: Upload device artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: EksilikApp-unsigned
          path: ${{ runner.temp }}/EksilikApp-unsigned.tar.gz
          if-no-files-found: error
          retention-days: 3

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: device-build-log-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/xcodebuild-device.log
          if-no-files-found: warn
          retention-days: 7
