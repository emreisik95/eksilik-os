name: App Store Release

on:
  workflow_dispatch:
    inputs:
      upload:
        description: Upload the exported IPA to App Store Connect
        required: true
        type: boolean
        default: true
      release_version:
        description: CFBundleShortVersionString for the archive
        required: true
        type: string
        default: "2.0.1"
      build_number:
        description: CFBundleVersion for the archive
        required: true
        type: string
        default: "10"

permissions:
  contents: read

env:
  XCODEGEN_URL: https://github.com/yonaskolb/XcodeGen/releases/download/2.46.0/xcodegen.artifactbundle.zip
  XCODEGEN_SHA256: ef6d0a23bfb7393387f98e321ffd78a487231172e2e78c48d3c26275c263fd0c
  XCODEGEN_ARCHIVE_DIRECTORY: xcodegen.artifactbundle/xcodegen-2.46.0-macosx/bin

concurrency:
  group: app-store-release
  cancel-in-progress: false

jobs:
  release:
    if: github.ref == 'refs/heads/main'
    name: Archive and upload ${{ inputs.release_version }} (${{ inputs.build_number }})
    runs-on: macos-26
    environment: app-store-production
    timeout-minutes: 60
    env:
      ASC_APP_ID: "1454249683"
      RELEASE_VERSION: ${{ inputs.release_version }}
      RELEASE_BUILD_NUMBER: ${{ inputs.build_number }}

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Verify release secrets
        env:
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_PRIVATE_KEY_BASE64: ${{ secrets.ASC_PRIVATE_KEY_BASE64 }}
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          APP_PROVISIONING_PROFILE_BASE64: ${{ secrets.APP_PROVISIONING_PROFILE_BASE64 }}
          WIDGET_PROVISIONING_PROFILE_BASE64: ${{ secrets.WIDGET_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          for name in \
            ASC_ISSUER_ID \
            ASC_KEY_ID \
            ASC_PRIVATE_KEY_BASE64 \
            BUILD_CERTIFICATE_BASE64 \
            P12_PASSWORD \
            APP_PROVISIONING_PROFILE_BASE64 \
            WIDGET_PROVISIONING_PROFILE_BASE64; do
            test -n "${!name}" || { echo "Missing required secret: $name" >&2; exit 1; }
          done

      - name: Install verified release tools
        run: |
          set -euo pipefail
          bash .github/scripts/install_verified_zip_tree.sh \
            "$XCODEGEN_URL" \
            "$XCODEGEN_SHA256" \
            "$XCODEGEN_ARCHIVE_DIRECTORY" \
            "$RUNNER_TEMP/xcodegen"

          case "$(uname -m)" in
            arm64)
              ASC_URL="https://github.com/rorkai/App-Store-Connect-CLI/releases/download/3.1.0/asc_3.1.0_macOS_arm64"
              ASC_SHA256="1c79e6da889ca665470f6cebe033b48897352ab001b04bca04555a86020368c9"
              ;;
            x86_64)
              ASC_URL="https://github.com/rorkai/App-Store-Connect-CLI/releases/download/3.1.0/asc_3.1.0_macOS_amd64"
              ASC_SHA256="9d9fd71c7ef105f3510dc24e9833af53b1ea4df38b61a8a66630fb8c30d345e5"
              ;;
            *)
              echo "Unsupported runner architecture: $(uname -m)" >&2
              exit 1
              ;;
          esac
          bash .github/scripts/install_verified_file.sh \
            "$ASC_URL" \
            "$ASC_SHA256" \
            "$RUNNER_TEMP/bin/asc"

          echo "$RUNNER_TEMP/xcodegen" >> "$GITHUB_PATH"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Validate release contract
        run: bash .github/scripts/validate-app-store-readiness.sh

      - name: Install signing assets
        env:
          KEYCHAIN_PATH: ${{ runner.temp }}/app-signing.keychain-db
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          APP_PROVISIONING_PROFILE_BASE64: ${{ secrets.APP_PROVISIONING_PROFILE_BASE64 }}
          WIDGET_PROVISIONING_PROFILE_BASE64: ${{ secrets.WIDGET_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          umask 077
          CERTIFICATE_PATH="$RUNNER_TEMP/apple-distribution.p12"
          APP_PROFILE_PATH="$RUNNER_TEMP/eksilik-app.mobileprovision"
          WIDGET_PROFILE_PATH="$RUNNER_TEMP/eksilik-widget.mobileprovision"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          printf '%s' "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          printf '%s' "$APP_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$APP_PROFILE_PATH"
          printf '%s' "$WIDGET_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$WIDGET_PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          install_profile() {
            local source="$1"
            local plist="$RUNNER_TEMP/profile.plist"
            security cms -D -i "$source" > "$plist"
            local uuid
            uuid="$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$plist")"
            mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
            local destination="$HOME/Library/MobileDevice/Provisioning Profiles/$uuid.mobileprovision"
            cp "$source" "$destination"
            printf '%s\n' "$destination" >> "$RUNNER_TEMP/installed-profiles.txt"
          }

          install_profile "$APP_PROFILE_PATH"
          install_profile "$WIDGET_PROFILE_PATH"

      - name: Archive
        run: |
          set -euo pipefail
          xcodebuild archive \
            -project EksilikApp.xcodeproj \
            -scheme EksilikApp \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/EksilikApp.xcarchive" \
            -skipPackagePluginValidation \
            MARKETING_VERSION="$RELEASE_VERSION" \
            CURRENT_PROJECT_VERSION="$RELEASE_BUILD_NUMBER"

      - name: Verify archived version
        run: |
          set -euo pipefail
          APP_PATH="$RUNNER_TEMP/EksilikApp.xcarchive/Products/Applications/EksilikApp.app"
          WIDGET_PATH="$APP_PATH/PlugIns/EksilikWidget.appex"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$APP_PATH/Info.plist")" = "$RELEASE_VERSION"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$APP_PATH/Info.plist")" = "$RELEASE_BUILD_NUMBER"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$WIDGET_PATH/Info.plist")" = "$RELEASE_VERSION"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$WIDGET_PATH/Info.plist")" = "$RELEASE_BUILD_NUMBER"
          test -f "$WIDGET_PATH/PrivacyInfo.xcprivacy"

      - name: Export IPA
        run: |
          set -euo pipefail
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/EksilikApp.xcarchive" \
            -exportPath "$RUNNER_TEMP/EksilikExport" \
            -exportOptionsPlist ExportOptions.plist
          test -f "$RUNNER_TEMP/EksilikExport/EksilikApp.ipa"

      - name: Authenticate asc
        if: ${{ inputs.upload }}
        env:
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_PRIVATE_KEY_BASE64: ${{ secrets.ASC_PRIVATE_KEY_BASE64 }}
        run: |
          set -euo pipefail
          umask 077
          PRIVATE_KEY_PATH="$RUNNER_TEMP/AuthKey_$ASC_KEY_ID.p8"
          printf '%s' "$ASC_PRIVATE_KEY_BASE64" | base64 --decode > "$PRIVATE_KEY_PATH"
          chmod 600 "$PRIVATE_KEY_PATH"
          asc auth login \
            --bypass-keychain \
            --local \
            --network \
            --name github-app-store-release \
            --key-id "$ASC_KEY_ID" \
            --issuer-id "$ASC_ISSUER_ID" \
            --private-key "$PRIVATE_KEY_PATH"

      - name: Upload build to App Store Connect
        if: ${{ inputs.upload }}
        run: |
          set -euo pipefail
          asc builds upload \
            --app "$ASC_APP_ID" \
            --ipa "$RUNNER_TEMP/EksilikExport/EksilikApp.ipa" \
            --version "$RELEASE_VERSION" \
            --build-number "$RELEASE_BUILD_NUMBER" \
            --wait

      - name: Remove temporary signing assets
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true
          if [[ -f "$RUNNER_TEMP/installed-profiles.txt" ]]; then
            while IFS= read -r profile; do
              rm -f "$profile"
            done < "$RUNNER_TEMP/installed-profiles.txt"
          fi
          rm -f \
            "$RUNNER_TEMP/apple-distribution.p12" \
            "$RUNNER_TEMP/eksilik-app.mobileprovision" \
            "$RUNNER_TEMP/eksilik-widget.mobileprovision" \
            "$RUNNER_TEMP/profile.plist" \
            "$RUNNER_TEMP/installed-profiles.txt"
          find "$RUNNER_TEMP" -maxdepth 1 -name 'AuthKey_*.p8' -delete
          rm -rf \
            "${RUNNER_TEMP:?}/EksilikApp.xcarchive" \
            "${RUNNER_TEMP:?}/EksilikExport" \
            "${RUNNER_TEMP:?}/xcodegen" \
            "${RUNNER_TEMP:?}/bin"
