name: App Store Release

on:
  workflow_dispatch:
    inputs:
      upload:
        description: Upload the exported IPA to App Store Connect
        required: true
        type: boolean
        default: true
      release_version:
        description: CFBundleShortVersionString for the archive
        required: true
        type: string
        default: "2.0.1"
      build_number:
        description: CFBundleVersion for the archive
        required: true
        type: string
        default: "9"

permissions:
  contents: read

concurrency:
  group: app-store-release
  cancel-in-progress: false

jobs:
  release:
    name: Archive and upload ${{ inputs.release_version }} (${{ inputs.build_number }})
    runs-on: macos-26
    timeout-minutes: 60
    env:
      ASC_APP_ID: "1454249683"
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_PRIVATE_KEY_BASE64: ${{ secrets.ASC_PRIVATE_KEY_BASE64 }}
      BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
      P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
      APP_PROVISIONING_PROFILE_BASE64: ${{ secrets.APP_PROVISIONING_PROFILE_BASE64 }}
      WIDGET_PROVISIONING_PROFILE_BASE64: ${{ secrets.WIDGET_PROVISIONING_PROFILE_BASE64 }}
      RELEASE_VERSION: ${{ inputs.release_version }}
      RELEASE_BUILD_NUMBER: ${{ inputs.build_number }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Verify release secrets
        run: |
          set -euo pipefail
          for name in \
            ASC_ISSUER_ID \
            ASC_KEY_ID \
            ASC_PRIVATE_KEY_BASE64 \
            BUILD_CERTIFICATE_BASE64 \
            P12_PASSWORD \
            APP_PROVISIONING_PROFILE_BASE64 \
            WIDGET_PROVISIONING_PROFILE_BASE64; do
            test -n "${!name}" || { echo "Missing required secret: $name" >&2; exit 1; }
          done

      - name: Install release tools
        run: brew install xcodegen asc

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Validate release contract
        run: bash .github/scripts/validate-app-store-readiness.sh

      - name: Install signing assets
        env:
          KEYCHAIN_PATH: ${{ runner.temp }}/app-signing.keychain-db
        run: |
          set -euo pipefail
          CERTIFICATE_PATH="$RUNNER_TEMP/apple-distribution.p12"
          APP_PROFILE_PATH="$RUNNER_TEMP/eksilik-app.mobileprovision"
          WIDGET_PROFILE_PATH="$RUNNER_TEMP/eksilik-widget.mobileprovision"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          printf '%s' "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          printf '%s' "$APP_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$APP_PROFILE_PATH"
          printf '%s' "$WIDGET_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$WIDGET_PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          install_profile() {
            local source="$1"
            local plist="$RUNNER_TEMP/profile.plist"
            security cms -D -i "$source" > "$plist"
            local uuid
            uuid="$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$plist")"
            mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
            cp "$source" "$HOME/Library/MobileDevice/Provisioning Profiles/$uuid.mobileprovision"
          }

          install_profile "$APP_PROFILE_PATH"
          install_profile "$WIDGET_PROFILE_PATH"

      - name: Archive
        run: |
          set -euo pipefail
          xcodebuild archive \
            -project EksilikApp.xcodeproj \
            -scheme EksilikApp \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/EksilikApp.xcarchive" \
            -skipPackagePluginValidation \
            MARKETING_VERSION="$RELEASE_VERSION" \
            CURRENT_PROJECT_VERSION="$RELEASE_BUILD_NUMBER"

      - name: Verify archived version
        run: |
          set -euo pipefail
          APP_PATH="$RUNNER_TEMP/EksilikApp.xcarchive/Products/Applications/EksilikApp.app"
          WIDGET_PATH="$APP_PATH/PlugIns/EksilikWidget.appex"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$APP_PATH/Info.plist")" = "$RELEASE_VERSION"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$APP_PATH/Info.plist")" = "$RELEASE_BUILD_NUMBER"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$WIDGET_PATH/Info.plist")" = "$RELEASE_VERSION"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$WIDGET_PATH/Info.plist")" = "$RELEASE_BUILD_NUMBER"

      - name: Export IPA
        run: |
          set -euo pipefail
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/EksilikApp.xcarchive" \
            -exportPath "$RUNNER_TEMP/EksilikExport" \
            -exportOptionsPlist ExportOptions.plist
          test -f "$RUNNER_TEMP/EksilikExport/EksilikApp.ipa"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: EksilikApp-${{ inputs.release_version }}-${{ inputs.build_number }}
          path: ${{ runner.temp }}/EksilikExport/EksilikApp.ipa
          if-no-files-found: error
          retention-days: 3

      - name: Authenticate asc
        if: ${{ inputs.upload }}
        run: |
          set -euo pipefail
          PRIVATE_KEY_PATH="$RUNNER_TEMP/AuthKey_$ASC_KEY_ID.p8"
          printf '%s' "$ASC_PRIVATE_KEY_BASE64" | base64 --decode > "$PRIVATE_KEY_PATH"
          chmod 600 "$PRIVATE_KEY_PATH"
          asc auth login \
            --bypass-keychain \
            --local \
            --network \
            --name github-app-store-release \
            --key-id "$ASC_KEY_ID" \
            --issuer-id "$ASC_ISSUER_ID" \
            --private-key "$PRIVATE_KEY_PATH"

      - name: Upload build to App Store Connect
        if: ${{ inputs.upload }}
        run: |
          set -euo pipefail
          asc builds upload \
            --app "$ASC_APP_ID" \
            --ipa "$RUNNER_TEMP/EksilikExport/EksilikApp.ipa" \
            --version "$RELEASE_VERSION" \
            --build-number "$RELEASE_BUILD_NUMBER" \
            --wait

      - name: Remove temporary keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true
