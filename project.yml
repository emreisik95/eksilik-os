name: EksilikApp
options:
  bundleIdPrefix: emre.isik
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

packages:
  Kanna:
    url: https://github.com/tid-kijyun/Kanna.git
    from: "5.3.0"
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess.git
    from: "4.2.2"

targets:
  EksilikApp:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: App
      - path: Core
      - path: Models
      - path: Services
      - path: ViewModels
      - path: Views
      - path: Resources
    dependencies:
      - package: Kanna
      - package: KeychainAccess
      - target: EksilikWidget
    info:
      path: EksilikApp-Info.plist
      properties:
        CFBundleDisplayName: "ek$ilik"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - eksilik
            CFBundleURLName: emre.isik.Eksilik
        CFBundleIcons:
          CFBundlePrimaryIcon:
            CFBundleIconFiles: []
          CFBundleAlternateIcons:
            AlternateIcon:
              CFBundleIconFiles:
                - AlternateIcon
            AlternateKlasik:
              CFBundleIconFiles:
                - AlternateKlasik
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: emre.isik.Eksilik
        MARKETING_VERSION: "2.0.1"
        CURRENT_PROJECT_VERSION: "4"
        CODE_SIGN_ENTITLEMENTS: EksilikApp.entitlements
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        debug:
          SWIFT_OPTIMIZATION_LEVEL: -Onone
        release:
          SWIFT_OPTIMIZATION_LEVEL: -O
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          DEVELOPMENT_TEAM: "235UP83FJ4"
          PROVISIONING_PROFILE_SPECIFIER: "Eksilik App Store AppGroups 2026"

  EksilikWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: EksilikWidget
      - path: Core/Widget
    info:
      path: EksilikWidget-Info.plist
      properties:
        CFBundleDisplayName: "ek$ilik"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        ITSAppUsesNonExemptEncryption: false
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: emre.isik.Eksilik.widget
        MARKETING_VERSION: "2.0.1"
        CURRENT_PROJECT_VERSION: "4"
        CODE_SIGN_ENTITLEMENTS: EksilikWidget.entitlements
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
      configs:
        release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          DEVELOPMENT_TEAM: "235UP83FJ4"
          PROVISIONING_PROFILE_SPECIFIER: "Eksilik Widget App Store AppGroups 2026"

  EksilikTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: EksilikTests
    dependencies:
      - target: EksilikApp
      - package: Kanna
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: emre.isik.Eksilik.tests
        SWIFT_VERSION: "5.9"

schemes:
  EksilikApp:
    build:
      targets:
        EksilikApp: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - EksilikTests
