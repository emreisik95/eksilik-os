name: EksilikApp
options:
  bundleIdPrefix: com.eksilik
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

packages:
  Kanna:
    url: https://github.com/tid-kijyun/Kanna.git
    from: "5.3.0"
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess.git
    from: "4.2.2"

targets:
  EksilikApp:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: App
      - path: Core
      - path: Models
      - path: Services
      - path: ViewModels
      - path: Views
      - path: Resources
    dependencies:
      - package: Kanna
      - package: KeychainAccess
      - target: EksilikWidget
    info:
      path: EksilikApp-Info.plist
      properties:
        CFBundleDisplayName: "ek$ilik"
        UILaunchScreen: {}
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - eksilik
            CFBundleURLName: com.eksilik.app
        CFBundleIcons:
          CFBundlePrimaryIcon:
            CFBundleIconFiles: []
          CFBundleAlternateIcons:
            AlternateIcon:
              CFBundleIconFiles:
                - AlternateIcon
            AlternateKlasik:
              CFBundleIconFiles:
                - AlternateKlasik
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.eksilik.app
        MARKETING_VERSION: "2.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        debug:
          SWIFT_OPTIMIZATION_LEVEL: -Onone
        release:
          SWIFT_OPTIMIZATION_LEVEL: -O

  EksilikWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: EksilikWidget
    info:
      path: EksilikWidget-Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.eksilik.app.widget
        MARKETING_VERSION: "2.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"

  EksilikTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: EksilikTests
    dependencies:
      - target: EksilikApp
      - package: Kanna
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.eksilik.app.tests
        SWIFT_VERSION: "5.9"

schemes:
  EksilikApp:
    build:
      targets:
        EksilikApp: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - EksilikTests
